<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Cinq Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070b1a;
    --bg-2:#0d1430;
    --panel:#121a38;
    --panel-2:#192347;
    --line:#26305c;
    --ink:#eaf0ff;
    --muted:#93a0c8;
    --halo:#b48cff;          /* badge ring purple */
    --gold:#f2c14e;
    --dominos:#0b6e9f;
    --hut:#ee3124;
    --papa:#2f7d32;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(900px 520px at 50% -8%, rgba(180,140,255,.18), transparent 62%),
      radial-gradient(700px 400px at 12% 110%, rgba(11,110,159,.16), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;min-height:100vh;
    padding:34px 18px 64px;position:relative;overflow-x:hidden;
  }
  /* starfield */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      radial-gradient(1.4px 1.4px at 20% 30%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 70% 20%, #cfe0ff, transparent),
      radial-gradient(1.6px 1.6px at 85% 60%, #fff, transparent),
      radial-gradient(1px 1px at 40% 70%, #bcd0ff, transparent),
      radial-gradient(1.3px 1.3px at 60% 85%, #fff, transparent),
      radial-gradient(1px 1px at 10% 80%, #fff, transparent);
    opacity:.5;
  }
  /* portrait backdrop */
  .portrait-bg{
    position:fixed;z-index:0;pointer-events:none;
    left:50%;top:46%;transform:translate(-50%,-50%);
    width:min(78vw,560px);max-width:560px;aspect-ratio:1/1;
    object-fit:cover;border-radius:50%;
    opacity:.10;filter:grayscale(.2) contrast(1.02);
    -webkit-mask-image:radial-gradient(circle at 50% 45%, #000 38%, transparent 70%);
            mask-image:radial-gradient(circle at 50% 45%, #000 38%, transparent 70%);
  }
  /* veil to keep foreground crisp */
  .veil{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 40%, transparent 0%, rgba(7,11,26,.55) 60%, rgba(7,11,26,.9) 100%);
  }
  .wrap{max-width:760px;margin:0 auto;position:relative;z-index:1}

  /* corner badge theme */
  .corner{
    position:fixed;width:120px;height:120px;opacity:.10;z-index:0;pointer-events:none;
    filter:saturate(1.1);
  }
  .corner.tl{top:-26px;left:-26px;transform:rotate(-12deg)}
  .corner.br{bottom:-26px;right:-26px;transform:rotate(14deg)}
  .corner.tr{top:-18px;right:-30px;width:96px;height:96px;transform:rotate(11deg)}
  .corner.bl{bottom:-20px;left:-30px;width:108px;height:108px;transform:rotate(-16deg)}
  .corner.m1{top:30%;left:-46px;width:80px;height:80px;opacity:.07;transform:rotate(7deg)}
  .corner.m2{top:64%;right:-42px;width:88px;height:88px;opacity:.07;transform:rotate(-9deg)}

  /* Hero */
  header{text-align:center;margin-bottom:34px}
  .badge{
    width:128px;height:128px;border-radius:50%;display:block;margin:0 auto 20px;
    box-shadow:
      0 0 0 4px rgba(180,140,255,.25),
      0 0 38px 6px rgba(180,140,255,.35),
      0 14px 40px rgba(0,0,0,.5);
    animation:float 6s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  h1{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    font-size:clamp(34px,8vw,58px);line-height:.95;letter-spacing:.02em;
  }
  h1 .glow{color:var(--gold);text-shadow:0 0 22px rgba(242,193,78,.45)}

  /* Cards */
  .cards{display:grid;gap:15px;margin-top:8px}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:16px;padding:18px 20px;
    position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--brand)}
  .brandname{font-family:'Anton',sans-serif;font-size:25px;text-transform:uppercase;letter-spacing:.02em}
  .go{
    border:none;border-radius:11px;cursor:pointer;color:#fff;background:var(--brand);
    font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.04em;text-transform:uppercase;
    padding:13px 22px;white-space:nowrap;transition:transform .08s ease,filter .15s ease;
  }
  .go:hover{filter:brightness(1.1)}
  .go:active{transform:translateY(1px) scale(.99)}
  .go:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  @media(max-width:480px){
    .card{flex-direction:column;align-items:stretch;text-align:center}
    .go{width:100%}
    .corner{width:90px;height:90px}
  }
  @media(prefers-reduced-motion:reduce){.badge{animation:none}}

  /* scratchpad / copy box */
  .clip{
    margin-top:26px;background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:16px;padding:18px 20px;
  }
  .clip-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;
  }
  .clip-head .lbl{font-family:'Anton',sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:.03em}
  .clip-head .hint{font-size:12px;color:var(--muted)}
  .clip textarea{
    width:100%;min-height:96px;background:var(--bg);border:1px solid var(--line);border-radius:11px;
    color:var(--ink);font-family:inherit;font-size:15px;line-height:1.55;padding:12px 14px;resize:vertical;
  }
  .clip textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,193,78,.15)}
  .clip-actions{display:flex;align-items:center;gap:12px;margin-top:12px}
  .clip-actions button{
    border:none;border-radius:11px;cursor:pointer;color:#1a1206;background:var(--gold);
    font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.04em;text-transform:uppercase;
    padding:11px 22px;transition:transform .08s ease,filter .15s ease;
  }
  .clip-actions button:hover{filter:brightness(1.07)}
  .clip-actions button:active{transform:translateY(1px) scale(.99)}
  .clip-actions button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .clip-actions button.ghost:hover{border-color:var(--gold);color:var(--ink);filter:none}
  .clip-actions .msg{font-size:12.5px;color:var(--gold);opacity:0;transition:opacity .2s ease}
  .clip-actions .msg.show{opacity:1}

  /* tabs */
  .tabs{display:flex;gap:6px;margin:0 0 22px;border-bottom:1px solid var(--line)}
  .tab{
    appearance:none;border:none;background:none;cursor:pointer;
    color:var(--muted);font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
    letter-spacing:.02em;padding:11px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-bottom-color:var(--gold)}
  .panel{display:none}
  .panel.active{display:block}

  /* free items */
  .free-intro{color:var(--muted);font-size:13.5px;margin-bottom:16px}
  .free-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{
    appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:999px;cursor:pointer;font-size:12.5px;font-weight:600;padding:7px 13px;
  }
  .chip:hover{color:var(--ink);border-color:var(--gold)}
  .chip.active{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .free-list{display:grid;gap:10px}
  .fi{
    background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;
  }
  .fi-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .fi-cat{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--halo);font-weight:700}
  .fi-cost{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .fi-item{font-size:15px;font-weight:600;margin:6px 0 2px;color:var(--ink)}
  .fi-notes{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .fi a.fi-link{
    display:inline-block;font-size:12.5px;font-weight:600;color:var(--gold);text-decoration:none;
    border:1px solid var(--line);border-radius:9px;padding:6px 12px;
  }
  .fi a.fi-link:hover{border-color:var(--gold)}
  .free-count{color:var(--muted);font-size:12px;margin-top:14px}
</style>
</head>

<script>
const CHAINS = [
  { id:'dominos',  name:"Domino's",    url:'https://www.dominos.com/en/pages/order/', brand:'var(--dominos)' },
  { id:'pizzahut', name:'Pizza Hut',   url:'https://www.pizzahut.com/',               brand:'var(--hut)' },
  { id:'papajohns',name:"Papa John's", url:'https://www.papajohns.com/order/menu',    brand:'var(--papa)' },
];

const cards = document.getElementById('cards');
CHAINS.forEach(chain=>{
  const card=document.createElement('div');
  card.className='card';
  card.style.setProperty('--brand', chain.brand);
  card.innerHTML = `
    <div class="brandname">${chain.name}</div>
    <button class="go" data-go="${chain.id}">Order now →</button>
  `;
  cards.appendChild(card);
  card.querySelector(`[data-go="${chain.id}"]`).addEventListener('click',()=>{
    window.open(chain.url, '_blank', 'noopener');
  });
});

// ---------- scratchpad ----------
const clipText = document.getElementById('clipText');
const clipMsg  = document.getElementById('clipMsg');
const STORE_KEY = 'pizza-launcher:scratchpad';

// load saved note (storage optional)
(async()=>{
  try{ const r = await window.storage.get(STORE_KEY); if(r&&r.value) clipText.value=r.value; }catch(e){}
})();
let saveTimer=null;
clipText.addEventListener('input',()=>{
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{ try{ await window.storage.set(STORE_KEY, clipText.value); }catch(e){} },300);
});

function flash(msg){ clipMsg.textContent=msg; clipMsg.classList.add('show');
  clearTimeout(clipMsg._t); clipMsg._t=setTimeout(()=>clipMsg.classList.remove('show'),2400); }

async function copyText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return true; }
  }catch(e){}
  try{
    clipText.focus(); clipText.select();
    const ok=document.execCommand('copy');
    window.getSelection && window.getSelection().removeAllRanges();
    return ok;
  }catch(e){ return false; }
}

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const t = clipText.value.trim();
  if(!t){ flash('Nothing to copy yet.'); return; }
  const ok = await copyText(t);
  flash(ok ? 'Copied — paste it at checkout.' : 'Select the text and copy manually.');
});
document.getElementById('clearBtn').addEventListener('click', async ()=>{
  clipText.value=''; clipText.focus();
  try{ await window.storage.delete(STORE_KEY); }catch(e){}
  flash('Cleared.');
});

// ---------- tabs ----------
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

const freeList = document.getElementById('freeList');
const freeControls = document.getElementById('freeControls');
const freeCount = document.getElementById('freeCount');
let activeCat = 'All';

const cats = ['All', ...Array.from(new Set(FREE_ITEMS.map(i=>i.cat)))];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='chip'+(c==='All'?' active':'');
  b.textContent=c;
  b.addEventListener('click',()=>{
    activeCat=c;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderFree();
  });
  freeControls.appendChild(b);
});

function esc(s){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function renderFree(){
  const items = activeCat==='All' ? FREE_ITEMS : FREE_ITEMS.filter(i=>i.cat===activeCat);
  freeList.innerHTML = items.map(i=>`
    <div class="fi">
      <div class="fi-top">
        <span class="fi-cat">${esc(i.cat)}</span>
        <span class="fi-cost">${esc(i.cost)}</span>
      </div>
      <div class="fi-item">${esc(i.item)}</div>
      ${i.notes ? `<div class="fi-notes">${esc(i.notes)}</div>` : ''}
      ${i.link ? `<a class="fi-link" href="${esc(i.link)}" target="_blank" rel="noopener">Open request page →</a>` : ''}
    </div>
  `).join('');
  freeCount.textContent = `${items.length} of ${FREE_ITEMS.length} offers`;
}
renderFree();
